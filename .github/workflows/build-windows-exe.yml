name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pydantic fastapi uvicorn

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --name "办公用品采购系统" --onefile --noconsole --add-data "static;static" --hidden-import uvicorn --hidden-import fastapi main.py

      - name: Publish Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '🚀 最新开发版' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: dist/办公用品采购系统.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
