name: Build Windows Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pydantic fastapi uvicorn

      - name: Build onefile portable EXE
        run: |
          pyinstaller --name "办公用品采购系统-绿色版" --onefile --noconsole --add-data "static;static" --hidden-import uvicorn --hidden-import fastapi main.py

      - name: Build onedir package for installer
        run: |
          pyinstaller --name "办公用品采购系统-文件夹版" --onedir --noconsole --add-data "static;static" --hidden-import uvicorn --hidden-import fastapi main.py

      - name: Download Chinese Language File for Inno Setup
        run: Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"

      - name: Build Inno Setup installer
        run: |
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $isccPath) {
            & $isccPath "installer.iss"
          } else {
            iscc "installer.iss"
          }

      - name: Publish release assets
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          commit: ${{ github.sha }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '🚀 最新开发版' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          artifacts: dist/办公用品采购系统-绿色版.exe,dist/办公用品采购系统-安装包.exe
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
