name: Build Windows Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pydantic fastapi uvicorn

      - name: Build onefile portable EXE
        run: |
          pyinstaller --noconfirm --clean --name "办公用品采购系统-绿色版" --onefile --noconsole --icon "assets/app_icon.ico" --add-data "static;static" --add-data "alembic;alembic" --add-data "alembic.ini;." --collect-all "webview" --collect-all "google.generativeai" --hidden-import "db.sqlalchemy_models" --hidden-import "uvicorn.loops.auto" --hidden-import "uvicorn.protocols.http.auto" --hidden-import "uvicorn.protocols.websockets.auto" --hidden-import "uvicorn.lifespan.on" desktop.py

      - name: Build onedir package for installer
        run: |
          pyinstaller --noconfirm --clean --name "办公用品采购系统-文件夹版" --onedir --noconsole --icon "assets/app_icon.ico" --add-data "static;static" --add-data "alembic;alembic" --add-data "alembic.ini;." --collect-all "webview" --collect-all "google.generativeai" --hidden-import "db.sqlalchemy_models" --hidden-import "uvicorn.loops.auto" --hidden-import "uvicorn.protocols.http.auto" --hidden-import "uvicorn.protocols.websockets.auto" --hidden-import "uvicorn.lifespan.on" desktop.py

      - name: Download Chinese Language File for Inno Setup
        run: Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"

      - name: Build Inno Setup installer
        run: |
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $isccPath) {
            & $isccPath "installer.iss"
          } else {
            iscc "installer.iss"
          }

      - name: Normalize release asset filenames
        run: |
          $portableSrc = "dist\办公用品采购系统-绿色版.exe"
          $setupSrc = "dist\办公用品采购系统-安装包.exe"
          $portableDst = "dist\office-supplies-portable.exe"
          $setupDst = "dist\office-supplies-setup.exe"

          if (!(Test-Path $portableSrc)) { throw "Missing artifact: $portableSrc" }
          if (!(Test-Path $setupSrc)) { throw "Missing artifact: $setupSrc" }

          Copy-Item -Path $portableSrc -Destination $portableDst -Force
          Copy-Item -Path $setupSrc -Destination $setupDst -Force

      - name: Remove existing release assets with same names
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.startsWith('refs/tags/v')
              ? context.ref.replace('refs/tags/', '')
              : 'latest';
            const targetNames = new Set([
              'office-supplies-portable.exe',
              'office-supplies-setup.exe',
              '办公用品采购系统-绿色版.exe',
              '办公用品采购系统-安装包.exe',
              '-.exe',
            ]);

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              for (const asset of release.assets) {
                if (!targetNames.has(asset.name)) continue;
                core.info(`Deleting existing asset: ${asset.name} (${asset.id})`);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release for tag '${tag}' does not exist yet, skip cleanup.`);
                return;
              }
              throw error;
            }

      - name: Publish release assets
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          commit: ${{ github.sha }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '🚀 最新开发版' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          artifacts: dist/office-supplies-portable.exe,dist/office-supplies-setup.exe
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
